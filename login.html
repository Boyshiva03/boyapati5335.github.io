<div class="container" style="background: rgba(0, 0, 0, 0.5); padding: 60px; border-radius: 20px; max-width: 400px; margin: 100px auto; color: white;">
    <br><h2>Sign In</h2></br>
    <br><input type="text" id="userInput" placeholder="Username"></br>
    <br><input type="password" id="passInput" placeholder="Password"></br>
    
    <br><button id="action-btn" onclick="validateLogin()">Submit</button></br>
    
    <p id="error-msg" style="color: #ff4d4d; display: none; font-size: 0.8rem;">Invalid Credentials!</p>
    <p><a href="index.html" style="color: white; font-size: 0.8rem;">Go Back Home</a></p>
</div>

    const validCreds = {

    };

    function validateLogin() {
    const user = document.getElementById('userInput').value;
    const pass = document.getElementById('passInput').value;
    const error = document.getElementById('error-msg');

    const validCreds = {
        "admin": "shiva123",
        "guest": "welcome2026"
    };

    if (validCreds[user] && validCreds[user] === pass) {

}
